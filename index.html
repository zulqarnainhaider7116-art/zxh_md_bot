<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WhatsApp Bot | Pairing Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 500px;
            transition: all 0.3s ease;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #c4b5fd;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #e0e0e0;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            font-size: 1rem;
            color: white;
            transition: all 0.3s;
            font-family: monospace;
            font-size: 1.1rem;
        }

        input:focus {
            outline: none;
            border-color: #a78bfa;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 12px rgba(167, 139, 250, 0.3);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(95deg, #7c3aed 0%, #a78bfa 100%);
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            text-align: center;
            transition: all 0.3s;
            border-left: 4px solid #a78bfa;
        }

        .result-code {
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 15px 0;
            word-break: break-all;
        }

        .status {
            font-size: 0.85rem;
            color: #a78bfa;
            margin-top: 8px;
        }

        .error {
            color: #f87171;
            border-left-color: #f87171;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 550px) {
            .glass-card {
                padding: 28px 20px;
            }
            h1 { font-size: 1.6rem; }
            .result-code { font-size: 1.4rem; letter-spacing: 2px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-card">
        <h1>⚡ HELL MD ⚡</h1>
        <div class="subtitle">Pair your device with secure code</div>
        
        <div class="input-group">
            <label>📱 WhatsApp Number</label>
            <input type="tel" id="phoneNumber" placeholder="923001234567" value="">
        </div>
        
        <button id="generateBtn">✨ Generate Pairing Code ✨</button>
        
        <div id="result" style="display: none;" class="result-box">
            <div style="font-size: 0.9rem; opacity:0.8;">🔑 Your Pairing Code</div>
            <div id="pairCode" class="result-code"></div>
            <div class="status">Go to WhatsApp → Linked Devices → Link with code</div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin; 
        const phoneInput = document.getElementById('phoneNumber');
        const generateBtn = document.getElementById('generateBtn');
        const resultDiv = document.getElementById('result');
        const pairCodeSpan = document.getElementById('pairCode');

        generateBtn.addEventListener('click', async () => {
            let phone = phoneInput.value.trim();
            if (!phone) {
                alert('Please enter your WhatsApp number with country code (e.g., 923001234567)');
                return;
            }
            const phoneRegex = /^[0-9]{10,15}$/;
            if (!phoneRegex.test(phone)) {
                alert('Invalid format! Use only digits: 923001234567 (Country code + number)');
                return;
            }

            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="loader"></span> Generating Code...';
            resultDiv.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/api/pair`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number: phone })
                });
                
                const data = await response.json();
                
                if (response.ok && data.code) {
                    pairCodeSpan.innerText = data.code;
                    resultDiv.classList.remove('error');
                    resultDiv.style.display = 'block';
                } else {
                    throw new Error(data.message || 'Failed to generate code');
                }
            } catch (error) {
                resultDiv.classList.add('error');
                pairCodeSpan.innerText = '⚠️ Error';
                document.querySelector('#result .status').innerText = error.message || 'Server error. Try again.';
                resultDiv.style.display = 'block';
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '✨ Generate Pairing Code ✨';
                setTimeout(() => {
                    if (resultDiv.classList.contains('error')) {
                        resultDiv.style.display = 'none';
                        document.querySelector('#result .status').innerText = 'Go to WhatsApp → Linked Devices → Link with code';
                        resultDiv.classList.remove('error');
                    }
                }, 5000);
            }
        });
    </script>
</body>
</html>
